{% extends "base.html" %}

{% block title %}Upload Resumes - Resume Ranker{% endblock %}

{% block content %}
<div class="card">
  <div class="card-header">
    <h1 class="card-title">Upload Resumes</h1>
  </div>

  <form method="POST" enctype="multipart/form-data">
    <div class="form-group">
      <label for="job_role_select" class="form-label">Select Job Role or Enter Custom</label>
      <select id="job_role_select" class="form-control" onchange="updateJobRole()">
        <option value="">-- Select a Job Role --</option>
        <option value="Python Developer">Python Developer</option>
        <option value="Full Stack Developer">Full Stack Developer</option>
        <option value="Data Scientist">Data Scientist</option>
        <option value="Machine Learning Engineer">Machine Learning Engineer</option>
        <option value="DevOps Engineer">DevOps Engineer</option>
        <option value="Frontend Developer">Frontend Developer</option>
        <option value="Backend Developer">Backend Developer</option>
        <option value="Product Manager">Product Manager</option>
        <option value="UI/UX Designer">UI/UX Designer</option>
        <option value="custom">Custom Role (Enter Below)</option>
      </select>
    </div>

    <div class="form-group">
      <label for="job_role" class="form-label">Job Role</label>
      <input type="text" id="job_role" name="job_role" class="form-control" placeholder="e.g. Senior Python Developer"
        required>
    </div>

    <div class="form-group">
      <label for="job_description" class="form-label">Job Description</label>
      <textarea id="job_description" name="job_description" class="form-control" rows="8"
        placeholder="Paste the full job description here..." required></textarea>
    </div>

    <div class="form-group">
      <label for="keywords" class="form-label">Keywords (Optional)</label>
      <input type="text" id="keywords" name="keywords" class="form-control"
        placeholder="Comma-separated keywords (e.g. Python, Django, AWS)">
    </div>

    <div class="form-group">
      <label class="form-label">Resume Files</label>
      <div class="upload-area" onclick="document.getElementById('resume').click()">
        <div class="upload-icon">📄</div>
        <h3>Click to Upload Resumes</h3>
        <p class="text-secondary">Supported formats: PDF, JPG, PNG</p>
        <input type="file" id="resume" name="resume" multiple accept=".pdf,.jpg,.jpeg,.png" style="display: none;"
          onchange="updateFileCount(this)">
        <p id="file-count" class="text-primary mt-2" style="display: none;"></p>
      </div>
    </div>

    <button type="submit" class="btn btn-primary btn-block">Analyze Resumes</button>
  </form>
</div>

<script>
  const jobDescriptions = {
    "Python Developer": "We are seeking a skilled Python Developer to join our team. The ideal candidate will have strong experience in Python programming, web frameworks like Django or Flask, and database management. Responsibilities include developing scalable applications, writing clean code, and collaborating with cross-functional teams. Required skills: Python, Django/Flask, REST APIs, SQL, Git. Preferred: AWS, Docker, Redis.",

    "Full Stack Developer": "Looking for a Full Stack Developer proficient in both frontend and backend technologies. You will build responsive web applications using modern frameworks. Required skills: JavaScript, React/Vue/Angular, Node.js, Express, MongoDB/PostgreSQL, HTML/CSS, Git. Preferred: TypeScript, Next.js, GraphQL, Docker, CI/CD.",

    "Data Scientist": "We need a Data Scientist to analyze complex datasets and build predictive models. You will work with large-scale data, develop machine learning algorithms, and present insights to stakeholders. Required skills: Python, Pandas, NumPy, Scikit-learn, SQL, Statistics, Data Visualization (Matplotlib/Seaborn). Preferred: TensorFlow/PyTorch, Spark, Tableau, R.",

    "Machine Learning Engineer": "Seeking a Machine Learning Engineer to design and deploy ML models at scale. You will build production-ready ML systems, optimize algorithms, and collaborate with data scientists. Required skills: Python, TensorFlow/PyTorch, Scikit-learn, Deep Learning, MLOps, Docker, Kubernetes. Preferred: AWS SageMaker, Spark, Model Deployment.",

    "DevOps Engineer": "We are hiring a DevOps Engineer to automate infrastructure and improve deployment pipelines. You will manage cloud infrastructure, implement CI/CD, and ensure system reliability. Required skills: AWS/Azure/GCP, Docker, Kubernetes, Jenkins/GitLab CI, Terraform, Linux, Bash/Python scripting. Preferred: Monitoring tools (Prometheus, Grafana), Ansible.",

    "Frontend Developer": "Looking for a Frontend Developer to create beautiful, responsive user interfaces. You will work with designers to implement pixel-perfect designs and ensure excellent user experience. Required skills: JavaScript, React/Vue/Angular, HTML5, CSS3, Responsive Design, Git. Preferred: TypeScript, Next.js, Tailwind CSS, Testing (Jest).",

    "Backend Developer": "We need a Backend Developer to build robust server-side applications and APIs. You will design database schemas, implement business logic, and ensure application performance. Required skills: Node.js/Python/Java, REST APIs, SQL/NoSQL databases, Authentication, Git. Preferred: Microservices, Redis, Message Queues, GraphQL.",

    "Product Manager": "Seeking a Product Manager to drive product strategy and roadmap. You will work with engineering, design, and business teams to deliver customer-centric products. Required skills: Product Strategy, Roadmap Planning, User Research, Agile/Scrum, Data Analysis, Stakeholder Management. Preferred: Technical background, SQL, Analytics tools.",

    "UI/UX Designer": "We are looking for a UI/UX Designer to create intuitive and engaging user experiences. You will conduct user research, create wireframes and prototypes, and collaborate with developers. Required skills: Figma/Sketch, User Research, Wireframing, Prototyping, Design Systems, HTML/CSS basics. Preferred: Motion design, Usability testing, Frontend knowledge."
  };

  function updateJobRole() {
    const select = document.getElementById('job_role_select');
    const roleInput = document.getElementById('job_role');
    const descTextarea = document.getElementById('job_description');
    const keywordsInput = document.getElementById('keywords');

    const selectedValue = select.value;

    if (selectedValue === 'custom') {
      roleInput.value = '';
      descTextarea.value = '';
      keywordsInput.value = '';
      roleInput.focus();
    } else if (selectedValue && jobDescriptions[selectedValue]) {
      roleInput.value = selectedValue;
      descTextarea.value = jobDescriptions[selectedValue];

      // Auto-populate keywords based on role
      const keywordMap = {
        "Python Developer": "Python, Django, Flask, REST API, SQL, Git, AWS, Docker",
        "Full Stack Developer": "JavaScript, React, Node.js, Express, MongoDB, HTML, CSS, Git",
        "Data Scientist": "Python, Pandas, NumPy, Scikit-learn, SQL, Machine Learning, Statistics",
        "Machine Learning Engineer": "Python, TensorFlow, PyTorch, Deep Learning, MLOps, Docker, Kubernetes",
        "DevOps Engineer": "AWS, Docker, Kubernetes, Jenkins, Terraform, Linux, CI/CD",
        "Frontend Developer": "JavaScript, React, HTML, CSS, TypeScript, Responsive Design",
        "Backend Developer": "Node.js, REST API, SQL, NoSQL, Authentication, Microservices",
        "Product Manager": "Product Strategy, Agile, User Research, Data Analysis, Roadmap",
        "UI/UX Designer": "Figma, User Research, Wireframing, Prototyping, Design Systems"
      };

      keywordsInput.value = keywordMap[selectedValue] || '';
    }
  }

  function updateFileCount(input) {
    const count = input.files.length;
    const display = document.getElementById('file-count');
    if (count > 0) {
      display.style.display = 'block';
      display.textContent = `${count} file(s) selected`;
    } else {
      display.style.display = 'none';
    }
  }
</script>
{% endblock %}
