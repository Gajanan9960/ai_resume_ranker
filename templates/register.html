{% extends "base.html" %}

{% block title %}Register - Resume Ranker{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="card">
        <h1 class="auth-title">Create Account</h1>
        <form method="POST" action="{{ url_for('register') }}" onsubmit="return validateRegistration()">
            <div class="form-group">
                <label for="username" class="form-label">Username</label>
                <input type="text" id="username" name="username" class="form-control" required minlength="3" maxlength="30" pattern="[a-zA-Z0-9_]+" title="Username can only contain letters, numbers, and underscores">
            </div>

            <div class="form-group">
                <label for="email" class="form-label">Email Address</label>
                <input type="email" id="email" name="email" class="form-control" required>
            </div>

            <div class="form-group">
                <label for="password" class="form-label">Password</label>
                <input type="password" id="password" name="password" class="form-control" required minlength="6">
            </div>

            <div class="form-group">
                <label for="confirm_password" class="form-label">Confirm Password</label>
                <input type="password" id="confirm_password" name="confirm_password" class="form-control" required minlength="6">
                <small id="password-error" class="text-danger mt-1" style="display: none;">Passwords do not match.</small>
            </div>

            <button type="submit" id="regSubmitBtn" class="btn btn-primary btn-block">Register</button>
        </form>

        <script>
            function validateRegistration() {
                const pass = document.getElementById('password').value;
                const confirm = document.getElementById('confirm_password').value;
                const errorMsg = document.getElementById('password-error');
                
                if (pass !== confirm) {
                    errorMsg.style.display = 'block';
                    return false;
                }
                
                errorMsg.style.display = 'none';
                
                // Disable button on successful submit to prevent double-clicks
                const btn = document.getElementById('regSubmitBtn');
                btn.disabled = true;
                btn.textContent = 'Registering...';
                
                return true;
            }
        </script>

        <div class="auth-footer">
            Already have an account? <a href="{{ url_for('login') }}">Login here</a>
        </div>
    </div>
</div>
{% endblock %}
