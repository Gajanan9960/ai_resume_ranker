<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Application Submitted</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .success-card { background: white; padding: 3rem; border-radius: 8px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); text-align: center; max-width: 500px; }
        .check-icon { font-size: 4rem; color: #10b981; margin-bottom: 1rem; }
        h1 { color: #1e293b; margin-top: 0; }
        p { color: #64748b; line-height: 1.5; margin-bottom: 0; }
    </style>
</head>
<body>

<div class="success-card">
    <div class="check-icon">✓</div>
    <h1>Application Received!</h1>
    <p>Thank you for applying to the <strong>{{ job.title }}</strong> position.</p>
    <p style="margin-top: 1rem;">Your resume has been successfully submitted and is currently being reviewed. We will contact you at the email address provided regarding next steps.</p>
</div>

</body>
</html>
